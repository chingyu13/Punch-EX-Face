    if (Math.abs(t - lastT) < 0.002) return;
    lastT = t;
    const [ia, ib, u] = t <= 0.5 ? [0, 1, t*2] : [1, 2, t*2 - 1];
    for (const p of parts) {
      p.el.setAttribute('d', buildD(lerpRings(p.rings[ia], p.rings[ib], u)));
      if (p.fills) {
        const a = p.fills[ia], b = p.fills[ib];
        p.el.setAttribute('fill', `rgb(${Math.round(a[0]+(b[0]-a[0])*u)},${Math.round(a[1]+(b[1]-a[1])*u)},${Math.round(a[2]+(b[2]-a[2])*u)})`);
      }
    }
  }
  applyMorph(0);

  /* Geometry in viewBox space */
  const INDEX      = { x:1940, y:705 };     // fingertip on punch art (cursor maps here)
  const STRIKE_OFF = { x:-110, y:25 };      // hit point relative to fingertip
  const HOME       = { x:-230, y:970 };
  const IDX_IMPACT = { x:-392.4, y:712.9 }; // snap target on impact
  const PUSH       = { x:-12, y:-6, ms:130 };
  // Jaw capsule (right ear → chin) with enter/exit hysteresis
  const CAP_A = { x:-425, y:585 }, CAP_B = { x:-645, y:805 };
  const R_IN = 120, R_OUT = 170;
  const R_SWEEP = 230; // sweep radius for fast pass-through
  const FACE_C = { x:-687, y:480 }, FACE_R = 400; // face circle for flyby hits
  const MORPH_MS = 180;

  function distToSeg(p, a, b) {
    const abx = b.x-a.x, aby = b.y-a.y;
    const t = Math.max(0, Math.min(1, ((p.x-a.x)*abx + (p.y-a.y)*aby) / (abx*abx + aby*aby)));
    return Math.hypot(p.x - (a.x + abx*t), p.y - (a.y + aby*t));
  }
  function segsIntersect(a, b, c, d) {
    const cr = (p, q, r) => (q.x-p.x)*(r.y-p.y) - (q.y-p.y)*(r.x-p.x);
    const d1 = cr(c,d,a), d2 = cr(c,d,b), d3 = cr(a,b,c), d4 = cr(a,b,d);
    return ((d1>0)!==(d2>0)) && ((d3>0)!==(d4>0));
  }
  function segSegDist(a, b, c, d) {
    if (segsIntersect(a,b,c,d)) return 0;
    return Math.min(distToSeg(a,c,d), distToSeg(b,c,d), distToSeg(c,a,b), distToSeg(d,a,b));
  }
  // Lower-right → upper-left swipe (0° = left, -90° = up), ±20° slack
  function isPunchAngle(dx, dy) {
    if (dx === 0 && dy === 0) return false;
    const deg = Math.atan2(dy, -dx) * (180 / Math.PI);
    return deg <= 20 && deg >= -110;
  }

  const state = {
    mode: 'IDLE', // IDLE | MOVING_PUNCH | IMPACT
    isPunching: false,
    hasUserInteracted: false,
    lastInteractionTime: Date.now(),
    punchCount: 0
  };
  const target = { x:HOME.x, y:HOME.y };
  const fist   = { x:HOME.x, y:HOME.y };
  let impactAt = 0, t = 0; // t = morph progress
  let flybyUntil = 0;     // hold punched face after a flyby
  let prevP = null;
  let lastSwipeOk = false;
  const FLYBY_HOLD_MS = 300;

  /* Name / punch counter label */
  const nameLabel = document.getElementById('name-label');
  let labelSubject = 'He';
  {
    const raw = location.search.replace(/^\?=?/, '').split('&')[0] || '';
    let name = raw;
    try { name = decodeURIComponent(raw); } catch (e) { /* keep raw */ }
    name = name.trim();
    if (name) {
      name = name.charAt(0).toUpperCase() + name.slice(1);
      labelSubject = name;
    }
  }
  function updatePunchLabel() {
    if (!nameLabel) return;
    nameLabel.textContent = labelSubject + ' deserves ' + state.punchCount + ' punches';
  }
  let lastPunchAt = 0;
  function registerPunch() {
    const now = performance.now();
    if (now - lastPunchAt < 120) return; // debounce pointer + fist sweep double-fire
    const rapid = lastPunchAt > 0 && (now - lastPunchAt) < 380;
    lastPunchAt = now;
    state.punchCount += 1;
    updatePunchLabel();
    // Retrigger face squash so rapid hits stay visible
    if (t > 0.3) t = 0.15;
    if (rapid && flybyUntil > now) flybyUntil = now + 50;
  }
  updatePunchLabel();


  function toSvg(cx, cy) {
    const m = svg.getScreenCTM();
    if (!m) return null;
    const p = new DOMPoint(cx, cy).matrixTransform(m.inverse());
    return { x:p.x, y:p.y };
  }

  function onPointer(ev) {
    const p = toSvg(ev.clientX, ev.clientY);
    if (!p) return;

    // Segment sweep so fast pointer jumps still register hits
    if (prevP && state.hasUserInteracted) {
      const dx = p.x - prevP.x, dy = p.y - prevP.y;
      if (dx * dx + dy * dy > 1) lastSwipeOk = isPunchAngle(dx, dy);
      const a = { x:prevP.x + STRIKE_OFF.x, y:prevP.y + STRIKE_OFF.y };
      const b = { x:p.x     + STRIKE_OFF.x, y:p.y     + STRIKE_OFF.y };
      const sweptFace = distToSeg(FACE_C, prevP, p) < FACE_R;
      const sweptJaw  = segSegDist(a, b, CAP_A, CAP_B) < R_SWEEP;
      if (lastSwipeOk && (sweptJaw || sweptFace) && state.mode !== 'IMPACT') {
        if (distToSeg(b, CAP_A, CAP_B) < R_IN) {
          enterImpact();
        } else {
          flybyUntil = performance.now() + ((lastPunchAt > 0 && performance.now() - lastPunchAt < 380) ? 70 : FLYBY_HOLD_MS); registerPunch();
        }
      }
    }
    prevP = p;

    target.x = p.x; target.y = p.y;
    state.hasUserInteracted = true;
    state.lastInteractionTime = Date.now();
    hideArrow();
    if (state.mode === 'IDLE') state.mode = 'MOVING_PUNCH';
  }
  function onPointerDown(ev) {
    onPointer(ev);
    const p = toSvg(ev.clientX, ev.clientY);
    if (!p) return;

    // A direct click on the lower-right cheek is a punch too. This uses the
    // same jaw capsule as swipe hits, but tests the cursor itself so repeated
    // clicks do not require artificial pointer movement.
    const clickedRightCheek =
      p.x > FACE_C.x &&
      p.y > FACE_C.y &&
      distToSeg(p, CAP_A, CAP_B) < R_OUT;
    if (!clickedRightCheek) return;

    if (state.mode === 'IMPACT') {
      impactAt = performance.now();
      registerPunch();
    } else {
      enterImpact();
    }
  }
  window.addEventListener('pointermove', onPointer);
  window.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointerup', () => { state.lastInteractionTime = Date.now(); });
  window.addEventListener('pointerleave', () => {
    state.lastInteractionTime = Date.now();
    prevP = null; // avoid a huge segment across leave/re-enter
  });

  function enterImpact() {
    state.mode = 'IMPACT'; state.isPunching = true;
    impactAt = performance.now();
    registerPunch();
  }
  function leaveImpact() {
    state.mode = 'MOVING_PUNCH'; state.isPunching = false;
  }

  /* Main loop */
  let prevT = performance.now();
  let prevFistStrike = null;
  function tick(now) {
    const dt = Math.min(64, now - prevT); prevT = now;

    const fistStrike   = { x:fist.x   + STRIKE_OFF.x, y:fist.y   + STRIKE_OFF.y };
    const targetStrike = { x:target.x + STRIKE_OFF.x, y:target.y + STRIKE_OFF.y };

    // Fist segment vs hitbox (avoids tunneling on fast moves)
    if (state.mode !== 'IMPACT' && lastSwipeOk && state.hasUserInteracted && prevFistStrike &&
        segSegDist(prevFistStrike, fistStrike, CAP_A, CAP_B) < R_SWEEP) {
      if (distToSeg(fistStrike, CAP_A, CAP_B) < R_IN) {
        enterImpact();
      } else {
        flybyUntil = performance.now() + ((lastPunchAt > 0 && performance.now() - lastPunchAt < 380) ? 70 : FLYBY_HOLD_MS); registerPunch();
      }
    } else if (state.mode === 'IMPACT' && distToSeg(targetStrike, CAP_A, CAP_B) > R_OUT) {
      leaveImpact();
    }
    prevFistStrike = fistStrike;

    // On impact, snap toward art pose with a short push
    let gx, gy;
    if (state.mode === 'IMPACT') {
      const pushing = (now - impactAt) < PUSH.ms;
      gx = IDX_IMPACT.x + (pushing ? PUSH.x : 0);
      gy = IDX_IMPACT.y + (pushing ? PUSH.y : 0);
    } else { gx = target.x; gy = target.y; }

    const tau = state.mode === 'IMPACT' ? 40 : 80;
    const k = 1 - Math.exp(-dt / tau);
    fist.x += (gx - fist.x) * k;
    fist.y += (gy - fist.y) * k;
    punch.setAttribute('transform',
      `translate(${(fist.x - INDEX.x).toFixed(2)} ${(fist.y - INDEX.y).toFixed(2)})`);

    // Morph toward punched (1) on impact/flyby, else rest (0).
    // Rapid punches use faster in/out so the face keeps bouncing.
    const T = (state.mode === 'IMPACT' || now < flybyUntil) ? 1 : 0;
    const rapidMorph = lastPunchAt > 0 && (now - lastPunchAt) < 420;
    const morphMs = T > t ? (rapidMorph ? 70 : MORPH_MS) : (rapidMorph ? 55 : MORPH_MS);
    const step = dt / morphMs;
    t = T > t ? Math.min(T, t + step) : Math.max(T, t - step);
    applyMorph(t);

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* Background thumb-downs */
  const bgThumbs = document.getElementById('bg-thumbs');
  const VB = { x:-1411.8, y:-230, w:1448, h:1152 };
  const SVGNS = 'http://www.w3.org/2000/svg';
  function spawnThumb() {
    if (!bgThumbs || bgThumbs.childElementCount >= 8) return;
    const pad = 200; // allow thumbs to sit half off-screen
    const x = VB.x - pad + Math.random() * (VB.w + pad * 2);
    const y = VB.y - pad + Math.random() * (VB.h + pad * 2);
    const sc = 0.3 + Math.random() * 0.45;
    const rot = -25 + Math.random() * 50;
    const op = 0.35 + Math.random() * 0.15;
    const g = document.createElementNS(SVGNS, 'g');
    g.setAttribute('opacity', op.toFixed(2));
    g.setAttribute('transform', `translate(${x.toFixed(1)} ${y.toFixed(1)}) rotate(${rot.toFixed(1)})`);
    const pop = document.createElementNS(SVGNS, 'g');
    const use = document.createElementNS(SVGNS, 'use');
    use.setAttribute('href', '#thumb-art');
    use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#thumb-art');
    pop.appendChild(use); g.appendChild(pop); bgThumbs.appendChild(g);
    const life = 1400 + Math.random() * 1200;
    pop.animate([
      { transform:'scale(0)' },
      { transform:`scale(${(sc*1.2).toFixed(3)})`, offset:0.10 },
      { transform:`scale(${(sc*0.92).toFixed(3)})`, offset:0.17 },
      { transform:`scale(${sc.toFixed(3)})`,        offset:0.24 },
      { transform:`scale(${sc.toFixed(3)})`,        offset:0.76 },
      { transform:`scale(${(sc*1.15).toFixed(3)})`, offset:0.84 },
      { transform:'scale(0)' }
    ], { duration: life, easing:'ease-in-out' }).onfinish = () => g.remove();
  }
  setInterval(spawnThumb, 420);

  /* Idle hint arrow after 4s without pointer motion */
  function showArrow() { arrow.classList.add('show'); }
  function hideArrow() { arrow.classList.remove('show'); }
  setInterval(() => {
    const idleMs = Date.now() - state.lastInteractionTime;
    if (idleMs > 4000) showArrow();
  }, 400);
})();
</script>
</body>
</html>
