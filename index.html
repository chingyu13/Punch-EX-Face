<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Punch!</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-L04TSNDKYD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-L04TSNDKYD');

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
  }
  body {
    min-height: 100%;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #f4efe8;
    color: #0a0a0a;
    font-family: Georgia, "Times New Roman", Times, serif;
  }
  .gate {
    width: min(100%, 420px);
    text-align: center;
  }
  label {
    display: block;
    margin: 0 0 18px;
    font-size: clamp(1.35rem, 4vw, 1.75rem);
    letter-spacing: 0.01em;
  }
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #0a0a0a;
    border-radius: 0;
    background: #faf7f2;
    color: #0a0a0a;
    font: inherit;
    font-size: 1.1rem;
    outline: none;
  }
  input[type="text"]:focus {
    background: #fff;
  }
  button {
    margin-top: 16px;
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #0a0a0a;
    background: #0a0a0a;
    color: #f4efe8;
    font: inherit;
    font-size: 1.05rem;
    cursor: pointer;
  }
  button:hover { opacity: 0.88; }
  .msg {
    margin-top: 20px;
    min-height: 1.4em;
    font-size: 1.05rem;
    line-height: 1.4;
  }
  .msg.error { color: #9f4235; }
</style>
</head>
<body>
  <form class="gate" id="gate" autocomplete="off">
    <label for="name">Enter your name</label>
    <input id="name" name="name" type="text" maxlength="80" autofocus required />
    <button type="submit">Enter</button>
    <p class="msg" id="msg" aria-live="polite"></p>
  </form>
<script>
(() => {
  'use strict';

  // Allowed answers as SHA-256 hashes only
  const ALLOWED_HASHES = new Set([
    'cd6b3c156686210115c5e0f2f61fcd8ca3feab05ff767af6df59fe4073cb709d',
    '0cba75553f8c70d89208ce876ed7c91a975f62855a562726f387c6176ffb85b6',
    'bf93161bf26a8b3137bdb228c3b09f301f699885729d6bbdbbac0ba768882cc6',
    '3f63571a4b511374b9649ac5b40af611886862801406e89cc1e189c5c4c3813c',
  ]);
  const AUTH_TOKEN = '67deea2d041c921d6380a22e0ed9911c6eaba043966d365b6c6e97b29123dbb1';

  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, '0')).join('');
  }
  function candidates(raw) {
    const t = raw.normalize('NFC').trim().replace(/\s+/g, ' ');
    if (!t) return [];
    const latin = t.toLowerCase();
    const ar = t.normalize('NFD').replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, '');
    return [...new Set([latin, ar])];
  }

  const form = document.getElementById('gate');
  const input = document.getElementById('name');
  const msg = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.textContent = '';
    msg.classList.remove('error');
    const hashes = await Promise.all(candidates(input.value).map(sha256));
    if (hashes.some((h) => ALLOWED_HASHES.has(h))) {
      sessionStorage.setItem('punch-auth', AUTH_TOKEN);
      location.href = 'punch.html?=omran';
      return;
    }
    msg.textContent = "Oops! It's not your birthday :)";
    msg.classList.add('error');
  });
})();
</script>
</body>
</html>
